<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <script type="module" src="script.js"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Tourney:400,500,600;">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Martian+Mono:400,500,600;">
</head>
<body>
    <div class="container">
        <h1>Tic Tac Toe</h1>
        <div class="status"></div>
        <div class="display">
            <div class="player">
                <h2>X</h2>
                <input class="name" id="playerone" type="text" placeholder="playername">
                <p class="score" id="scoreone"></p>
            </div>
            <div class="gameboard"></div>
            <div class="player">
                <h2>O</h2>
                <input class="name" id="playertwo" type="text" placeholder="playername">
                <p class="score" id="scoretwo"></p>
            </div>
        </div>
        <button id="reset">New game</button>
    </div>
</body>
</html>
