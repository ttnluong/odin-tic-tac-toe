<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <script type="module" src="script.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Tic Tac Toe</h1>
        <div class="turn"></div>
        <div class="display">
            <div class="player">
                <h2>X</h2>
                <input class="name playerone" type="text">
                <p class="score playerone"></p>
            </div>
            <div class="gameboard"></div>
            <div class="player">
                <h2>O</h2>
                <input class="name playertwo" type="text">
                <p class="score playertwo"></p>
            </div>
        </div>
        <button>New game</button>
    </div>
</body>
</html>
